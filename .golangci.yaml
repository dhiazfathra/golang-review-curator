run:
  timeout: 5m
  go: "1.22"

version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - bodyclose
    - contextcheck

  exclusions:
    rules:
      - path: "_test.go"
        linters: [errcheck]
      - path: "cmd/"
        linters: [gocritic]
      - linters: [gocritic]
        text: "exitAfterDefer"

  settings:
    gocritic:
      disabled-checks:
        - exitAfterDefer
    exhaustive:
      default-signifies-exhaustive: false

formatters:
  enable:
    - gofmt
    - goimports
