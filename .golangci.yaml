run:
  timeout: 5m
  go: "1.22"

version: 2

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - bodyclose
    - contextcheck

  settings:
    gocritic:
      disabled-checks:
        - exitAfterDefer
  exhaustive:
    default-signifies-exhaustive: false
    check-generated: false

formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclude-rules:
    - path: "_test.go"
      linters: [errcheck]
    - path: "cmd/"
      linters: [gocritic]
    - linters: [gocritic]
      text: "exitAfterDefer"
