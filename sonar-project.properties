# =============================================================================
# SonarQube Configuration for Go Project
# =============================================================================
# Best practices applied:
#   - Coverage via "go test -coverprofile"
#   - Exclusions for generated code, vendor, and test helpers
#   - Static analysis via golangci-lint report (if available)
# =============================================================================


# -----------------------------------------------------------------------------
# PROJECT IDENTIFICATION
# -----------------------------------------------------------------------------

sonar.projectKey=dhiazfathra_golang-clean-architecture
sonar.projectName=golang-clean-architecture
sonar.projectVersion=1.2.0

# Optional: description shown in SonarQube UI
# sonar.projectDescription=Short description of the project

# Optional: link to project homepage
# sonar.links.homepage=https://github.com/org/my-go-project

# Optional: link to CI system
# sonar.links.ci=https://github.com/org/my-go-project/actions

# Optional: link to issue tracker
# sonar.links.issue=https://github.com/org/my-go-project/issues

# Optional: link to SCM
# sonar.links.scm=https://github.com/org/my-go-project


# -----------------------------------------------------------------------------
# SOURCE & TEST PATHS
# -----------------------------------------------------------------------------

# Root directory for sources (relative to sonar-project.properties)
sonar.sources=.

# Directories containing test files
sonar.tests=.

# Inclusion pattern for test files (Go convention: *_test.go)
sonar.test.inclusions=**/*_test.go

# Exclude test files from the main source analysis
sonar.exclusions=**/*_test.go

# Optional: exclude generated protobuf / mock files
# sonar.exclusions=**/*_test.go,**/*.pb.go,**/mock_*.go,**/mocks/**

# Optional: exclude vendor directory (if not using Go modules proxy)
# sonar.exclusions=**/*_test.go,vendor/**

# Optional: restrict analysis to specific source directories
# sonar.sources=cmd,internal,pkg

# Optional: additional test file inclusions
# sonar.test.inclusions=**/*_test.go,**/testdata/**


# -----------------------------------------------------------------------------
# LANGUAGE
# -----------------------------------------------------------------------------

sonar.language=go

# Optional: enforce a specific Go version for analysis
# sonar.go.goversion=1.22


# -----------------------------------------------------------------------------
# ENCODING
# -----------------------------------------------------------------------------

sonar.sourceEncoding=UTF-8


# -----------------------------------------------------------------------------
# COVERAGE
# -----------------------------------------------------------------------------
# Run before analysis:
#   make cover
# (Generates coverage.out via: go test ./... -coverprofile=coverage.out -covermode=atomic)

sonar.go.coverage.reportPaths=coverage.out

# Optional: multiple coverage report files (comma-separated)
# sonar.go.coverage.reportPaths=coverage.out,coverage-integration.out

# Optional: overall coverage threshold — fail the Quality Gate below this %
# (configure in SonarQube Quality Gate UI instead for more flexibility)
# sonar.coverage.minimum=80


# -----------------------------------------------------------------------------
# TEST REPORTS
# -----------------------------------------------------------------------------
# Run before analysis:
#   go test ./... -json > test-report.json
#   (requires: go install github.com/jstemmer/go-junit-report/v2@latest)
#   go test ./... -v 2>&1 | go-junit-report -set-exit-code > test-report.xml

# sonar.go.tests.reportPaths=test-report.json

# JUnit XML format (widely supported alternative)
sonar.junit.reportPaths=test-report.xml


# -----------------------------------------------------------------------------
# EXTERNAL LINTER ISSUES (golangci-lint)
# -----------------------------------------------------------------------------
# Run before analysis:
#   golangci-lint run \
#     --out-format checkstyle \
#     --issues-exit-code 0 \
#     ./... > golangci-lint-report.xml

# sonar.go.golangci-lint.reportPaths=golangci-lint-report.xml


# -----------------------------------------------------------------------------
# SCM / BLAME
# -----------------------------------------------------------------------------

# Enable SCM integration for blame info (used in issue assignment, new code)
sonar.scm.provider=git

# Optional: disable SCM if running in a shallow clone or detached HEAD
# sonar.scm.disabled=true

# Optional: force revision used as "new code" baseline
# sonar.scm.revision=HEAD


# -----------------------------------------------------------------------------
# NEW CODE DEFINITION
# -----------------------------------------------------------------------------
# Prefer configuring this in SonarQube UI (Administration > New Code).
# Use these only for pipeline-level overrides.

# Analyse only changes since a specific date
# sonar.newCode.referenceBranch=main

# Optional: number of days to consider as "new code"
# sonar.newCode.previousVersion=30


# -----------------------------------------------------------------------------
# BRANCH & PULL REQUEST ANALYSIS
# -----------------------------------------------------------------------------
# Requires SonarQube Developer Edition or above.

# Current branch being analysed
# sonar.branch.name=feature/my-feature

# Target branch for comparison (usually main or master)
# sonar.branch.target=main

# Pull request key (from your CI provider)
# sonar.pullrequest.key=42
# sonar.pullrequest.branch=feature/my-feature
# sonar.pullrequest.base=main

# GitHub-specific PR decoration
# sonar.pullrequest.provider=github
# sonar.pullrequest.github.repository=org/my-go-project
# sonar.pullrequest.github.endpoint=https://api.github.com/

# GitLab-specific PR decoration
# sonar.pullrequest.provider=gitlab
# sonar.pullrequest.gitlab.repositorySlug=org/my-go-project


# -----------------------------------------------------------------------------
# AUTHENTICATION
# -----------------------------------------------------------------------------
# Prefer passing the token via environment variable:
#   SONAR_TOKEN=<token> sonar-scanner
# or via CLI flag: -Dsonar.token=<token>
# Never hard-code tokens here.

# sonar.token=<your-sonarqube-token>
# sonar.login=<deprecated-use-sonar.token-instead>
# sonar.password=<only-for-legacy-user-password-auth>


# -----------------------------------------------------------------------------
# SONARQUBE / SONARCLOUD SERVER
# -----------------------------------------------------------------------------

# sonar.host.url=http://localhost:9000

# SonarCloud-specific
# sonar.organization=my-github-org


# -----------------------------------------------------------------------------
# QUALITY GATE
# -----------------------------------------------------------------------------

# Fail the pipeline if the Quality Gate is not passed
# sonar.qualitygate.wait=true

# Timeout (seconds) to wait for the Quality Gate result
# sonar.qualitygate.timeout=300


# -----------------------------------------------------------------------------
# ANALYSIS SCOPE TUNING
# -----------------------------------------------------------------------------

# Ignore specific rules on specific files (format: <rule>,<file-pattern>)
# sonar.issue.ignore.multicriteria=e1
# sonar.issue.ignore.multicriteria.e1.ruleKey=go:S1135
# sonar.issue.ignore.multicriteria.e1.resourceKey=**/cmd/main.go

# Ignore all issues in generated files
# sonar.issue.ignore.allfile=generated
# sonar.issue.ignore.allfile.generated.fileRegexp=.*\.pb\.go

# Ignore a block of code between markers
# sonar.issue.ignore.block=ignore1
# sonar.issue.ignore.block.ignore1.beginBlockRegexp=//nolint
# sonar.issue.ignore.block.ignore1.endBlockRegexp=//endnolint

# Ignore S100 (naming convention) on all test files
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S100
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go


# -----------------------------------------------------------------------------
# DUPLICATION DETECTION
# -----------------------------------------------------------------------------

# Minimum number of tokens considered a duplication (default: 100)
# sonar.cpd.go.minimumTokens=100

# Exclude files from duplication detection
# sonar.cpd.exclusions=**/*_gen.go,**/testdata/**


# -----------------------------------------------------------------------------
# LOGGING & DEBUG
# -----------------------------------------------------------------------------

# Verbose scanner output (useful for CI troubleshooting)
# sonar.verbose=true

# Enable scanner debug logs
# sonar.scanner.dumpToFile=sonar-dump.properties

# Workspace directory used by the scanner
# sonar.working.directory=.scannerwork
