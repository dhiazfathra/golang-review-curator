name: SQL Migrations Validation

permissions:
  contents: read

on:
  pull_request:
    paths:
      - '**/migrations/*.sql'
  workflow_dispatch:

jobs:
  validate-sql:
    name: Validate SQL migrations
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary

      - name: Validate Core Service Migrations
        if: hashFiles('core-service/migrations/*.sql') != ''
        run: |
          python -c "
          import psycopg2
          import os
          import glob
          import re
          
          # Connect to test database
          conn = psycopg2.connect(
              host='localhost',
              database='test',
              user='postgres',
              password='postgres'
          )
          conn.autocommit = True
          
          # Get all up migrations sorted by number
          migrations = sorted(glob.glob('core-service/migrations/*_*.up.sql'), 
                             key=lambda x: int(re.search(r'(\d+)_', os.path.basename(x)).group(1)))
          
          print('Validating Core Service Migrations...')
          for migration in migrations:
              print(f'Testing {migration}')
              try:
                  cursor = conn.cursor()
                  with open(migration, 'r') as f:
                      sql = f.read()
                  cursor.execute(sql)
                  cursor.close()
                  print(f'✅ {migration} is valid')
              except Exception as e:
                  print(f'❌ Error in {migration}: {e}')
                  conn.close()
                  exit(1)
          
          # Reset database for down migrations
          cursor = conn.cursor()
          cursor.execute('DROP SCHEMA public CASCADE; CREATE SCHEMA public;')
          cursor.close()
          
          # Get all down migrations sorted by number in reverse
          down_migrations = sorted(glob.glob('core-service/migrations/*_*.down.sql'), 
                                  key=lambda x: int(re.search(r'(\d+)_', os.path.basename(x)).group(1)),
                                  reverse=True)
          
          for migration in down_migrations:
              print(f'Testing {migration}')
              try:
                  cursor = conn.cursor()
                  with open(migration, 'r') as f:
                      sql = f.read()
                  cursor.execute(sql)
                  cursor.close()
                  print(f'✅ {migration} is valid')
              except Exception as e:
                  print(f'❌ Error in {migration}: {e}')
                  conn.close()
                  exit(1)
          
          conn.close()
          print('All Core Service migrations validated successfully')
          "

      - name: Validate Analytics Service Migrations
        if: hashFiles('analytics-service/migrations/*.sql') != ''
        run: |
          python -c "
          import psycopg2
          import os
          import glob
          import re
          
          # Connect to test database
          conn = psycopg2.connect(
              host='localhost',
              database='test',
              user='postgres',
              password='postgres'
          )
          conn.autocommit = True
          
          # Reset database
          cursor = conn.cursor()
          cursor.execute('DROP SCHEMA public CASCADE; CREATE SCHEMA public;')
          cursor.close()
          
          # Get all up migrations sorted by number
          migrations = sorted(glob.glob('analytics-service/migrations/*_*.up.sql'), 
                             key=lambda x: int(re.search(r'(\d+)_', os.path.basename(x)).group(1)))
          
          print('Validating Analytics Service Migrations...')
          for migration in migrations:
              print(f'Testing {migration}')
              try:
                  cursor = conn.cursor()
                  with open(migration, 'r') as f:
                      sql = f.read()
                  cursor.execute(sql)
                  cursor.close()
                  print(f'✅ {migration} is valid')
              except Exception as e:
                  print(f'❌ Error in {migration}: {e}')
                  conn.close()
                  exit(1)
          
          # Reset database for down migrations
          cursor = conn.cursor()
          cursor.execute('DROP SCHEMA public CASCADE; CREATE SCHEMA public;')
          cursor.close()
          
          # Get all down migrations sorted by number in reverse
          down_migrations = sorted(glob.glob('analytics-service/migrations/*_*.down.sql'), 
                                  key=lambda x: int(re.search(r'(\d+)_', os.path.basename(x)).group(1)),
                                  reverse=True)
          
          for migration in down_migrations:
              print(f'Testing {migration}')
              try:
                  cursor = conn.cursor()
                  with open(migration, 'r') as f:
                      sql = f.read()
                  cursor.execute(sql)
                  cursor.close()
                  print(f'✅ {migration} is valid')
              except Exception as e:
                  print(f'❌ Error in {migration}: {e}')
                  conn.close()
                  exit(1)
          
          conn.close()
          print('All Analytics Service migrations validated successfully')
          "
