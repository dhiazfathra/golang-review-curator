  # ── Security: govulncheck ──
  vulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  # ── Security: gosec ──
  gosec:
    name: Security Scan (gosec)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run gosec (human-readable output)
        uses: securego/gosec@v2.23.0
        with:
          args: -fmt text -severity medium ./...
        continue-on-error: true # let the SARIF step always run

      - name: Run gosec (SARIF for upload)
        uses: securego/gosec@v2.23.0
        with:
          args: -fmt sarif -out gosec.sarif ./...
        continue-on-error: true # prevent blocking SARIF upload

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: gosec.sarif

  # ── Security: Dependency License Check ──
  license-check:
    name: License Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest
      - name: Check licenses
        run: go-licenses check ./... --disallowed_types=forbidden,restricted
        continue-on-error: true # warn only; tighten after initial baseline

  # ── Build Verification ──
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        run: go build -o /dev/null ./cmd/server/...
      - name: Vet
        run: go vet ./...
