name: CI

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true

env:
  GO_VERSION: "1.22"

jobs:
  # ── Lint ──
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  # ── Test + Coverage ──
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest
      - name: Run tests with coverage
        run: make test-report
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          ENV: test
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 5
      - name: Check coverage threshold
        run: make cover-check
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          slug: dhiazfathra/golang-clean-architecture
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── SQL Migration Validation ──
  sql-validate:
    name: SQL Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Validate migration filenames
        run: |
          ERRORS=0
          for f in migrations/*.up.sql migrations/*.down.sql; do
            [ -e "$f" ] || continue
            base=$(basename "$f")
            if ! echo "$base" | grep -qE '^[0-9]{14}_[a-z_]+\.(up|down)\.sql$'; then
              echo "::error file=$f::Invalid migration name: $base (expected YYYYMMDDHHMMSS_name.up.sql)"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then exit 1; fi
      - name: Validate migration pairs
        run: |
          ERRORS=0
          for f in migrations/*.up.sql; do
            [ -e "$f" ] || continue
            down="${f%.up.sql}.down.sql"
            if [ ! -f "$down" ]; then
              echo "::warning file=$f::Missing down migration: $(basename "$down")"
            fi
          done
