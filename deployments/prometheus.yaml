global:
  scrape_interval: 15s

scrape_configs:
  - job_name: review-curator-server
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: /metrics

  - job_name: review-curator-worker
    static_configs:
      - targets: ["host.docker.internal:9091"]
    metrics_path: /metrics
